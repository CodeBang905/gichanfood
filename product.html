<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기찬푸드 — 제품 상세</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffffff;--bg2:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;--surface3:#e2e8f0;
  --orange:#ea580c;--orange2:#f97316;--orange-dim:rgba(234,88,12,.1);
  --teal:#0d9488;--text:#1e293b;--text-sub:#475569;--text-muted:#94a3b8;
  --border:rgba(0,0,0,.09);--radius:16px;--radius-sm:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--orange);border-radius:3px}
img{display:block;max-width:100%}

/* NAV */
nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 5%;height:64px;
  background:rgba(255,255,255,.97);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  box-shadow:0 2px 12px rgba(0,0,0,.06);
}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:'Noto Serif KR',serif;font-weight:700;font-size:1.05rem;text-decoration:none;color:var(--text)}
.nav-logo-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--orange),#dc2626);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:900;color:white;font-family:'Noto Serif KR',serif}
.back-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:50px;
  background:var(--surface2);border:none;cursor:pointer;
  font-family:inherit;font-size:.85rem;color:var(--text-sub);
  transition:background .2s;
}
.back-btn:hover{background:var(--surface3)}

/* LAYOUT */
.page{max-width:960px;margin:0 auto;padding:40px 5% 80px}

/* GALLERY */
.gallery{margin-bottom:32px}
.main-img-wrap{width:100%;aspect-ratio:4/3;max-height:420px;background:var(--surface2);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.main-img{width:100%;height:100%;object-fit:cover;transition:opacity .2s}
.thumbs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin}
.thumb{width:72px;height:72px;flex-shrink:0;border-radius:8px;object-fit:cover;cursor:pointer;border:2.5px solid transparent;opacity:.6;transition:all .2s}
.thumb.active,.thumb:hover{border-color:var(--orange);opacity:1}

/* INFO */
.product-tag{display:inline-block;background:var(--orange-dim);color:var(--orange);font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:50px;margin-bottom:10px}
.product-title{font-family:'Noto Serif KR',serif;font-size:1.7rem;font-weight:900;color:var(--text);margin-bottom:8px;line-height:1.3}
.product-desc{font-size:.95rem;color:var(--text-sub);margin-bottom:28px;line-height:1.7}

/* OPTIONS */
.opts-label{font-size:.75rem;font-weight:700;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
.opt-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  cursor:pointer;transition:all .2s;gap:12px;
}
.opt-row:hover,.opt-row.sel{border-color:var(--orange);background:var(--orange-dim)}
.opt-row input{accent-color:var(--orange);flex-shrink:0;width:16px;height:16px}
.opt-name{font-size:.9rem;font-weight:500;color:var(--text);flex:1}
.opt-price{font-size:.95rem;font-weight:700;color:var(--orange);white-space:nowrap}

/* ACTIONS */
.actions{display:flex;gap:12px;margin-bottom:48px}
.btn-sample{
  flex:1;padding:16px;
  background:linear-gradient(135deg,var(--orange),#dc2626);
  color:#fff;border:none;border-radius:var(--radius-sm);
  font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;
  transition:transform .2s,box-shadow .2s;
}
.btn-sample:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(234,88,12,.4)}
.btn-kakao{
  padding:16px 20px;background:#fee500;color:#3c1e1e;
  border:none;border-radius:var(--radius-sm);
  font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;
  transition:opacity .2s;white-space:nowrap;
}
.btn-kakao:hover{opacity:.85}

/* ORDER FORM */
.order-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:32px}
.order-title{font-size:1.1rem;font-weight:700;margin-bottom:20px;color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:.8rem;font-weight:600;color:var(--text-sub)}
.form-input{
  padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-family:inherit;font-size:.9rem;color:var(--text);background:#fff;
  transition:border-color .2s;
}
.form-input:focus{outline:none;border-color:var(--orange)}
.form-submit{
  width:100%;padding:15px;margin-top:8px;
  background:var(--orange);color:#fff;border:none;border-radius:var(--radius-sm);
  font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;
  transition:background .2s;
}
.form-submit:hover{background:var(--orange2)}
.form-submit:disabled{background:#ccc;cursor:not-allowed}
.form-msg{text-align:center;padding:14px;font-size:.9rem;font-weight:500;display:none}
.form-msg.sending{color:var(--text-muted)}
.form-msg.success{color:#16a34a}

/* NOTICE */
.notice{background:var(--surface2);border-radius:var(--radius-sm);padding:16px 20px;font-size:.85rem;color:var(--text-sub);line-height:1.7}
.notice strong{color:var(--text)}

@media(max-width:600px){
  .product-title{font-size:1.3rem}
  .main-img-wrap{aspect-ratio:1/1}
  .form-row{grid-template-columns:1fr}
  .actions{flex-direction:column}
  .btn-kakao{text-align:center}
}
</style>
</head>

<nav>
  <a class="nav-logo" href="/">
    <div class="nav-logo-icon">기찬</div>
    기찬푸드
  </a>
  <button class="back-btn" onclick="history.back()">← 제품 목록</button>
</nav>

<div class="page">
  <!-- 갤러리 -->
  <div class="gallery">
    <div class="main-img-wrap">

    </div>
    <div class="thumbs" id="thumbs"></div>
  </div>

  <!-- 제품 정보 -->
  <div class="product-tag">기찬푸드 B2B 제품</div>
  <div class="product-title" id="productTitle"></div>
  <div class="product-desc" id="productDesc"></div>

  <!-- 옵션 선택 -->
  <div class="opts-label">옵션 선택</div>
  <div class="options" id="options"></div>

  <!-- 바로 신청 / 카카오 -->
  <div class="actions">
    <button class="btn-sample" onclick="scrollToForm()">📦 샘플 · 주문 신청</button>
    <button class="btn-kakao" onclick="window.open('https://open.kakao.com/o/sDAu5Nti','_blank')">💬 카카오 문의</button>
  </div>

  <!-- 주문 폼 -->
  <div class="order-section" id="orderSection">
    <div class="order-title">📋 샘플 / 주문 신청서</div>
    <div id="orderForm">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">성함 *</label>
          <input class="form-input" id="oName" placeholder="홍길동">
        </div>
        <div class="form-group">
          <label class="form-label">연락처 *</label>
          <input class="form-input" id="oPhone" placeholder="010-0000-0000">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label class="form-label">식당명</label>
          <input class="form-input" id="oRest" placeholder="(선택) 운영 중인 식당명">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label class="form-label">선택 옵션</label>
          <input class="form-input" id="oOption" readonly placeholder="위에서 옵션을 선택해주세요">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label class="form-label">추가 문의사항</label>
          <textarea class="form-input" id="oMsg" rows="3" placeholder="수량, 배송지, 기타 문의 등"></textarea>
        </div>
      </div>
      <button class="form-submit" id="oSubmit" onclick="submitOrder()">신청하기</button>
    </div>
    <div class="form-msg sending" id="oSending">전송 중입니다...</div>
    <div class="form-msg success" id="oSuccess">✅ 신청이 완료되었습니다! 담당자가 확인 후 연락드립니다.</div>
  </div>

  <div class="notice">
    <strong>안내</strong><br>
    · 샘플 신청 후 담당자 확인 시 연락드립니다.<br>
    · B2B 대량 주문 / 납품 문의는 카카오 채널을 이용해주세요.<br>
    · 운영시간 09:00 ~ 18:00 (평일 기준)
  </div>
</div>

// URL에서 id 읽어서 페이지 렌더링
const params=new URLSearchParams(location.search);
const id=params.get('id');
const p=PRODUCTS[id];

if(!p){
  document.querySelector('.page').innerHTML='<p style="text-align:center;padding:80px 0;color:var(--text-muted)">제품을 찾을 수 없습니다. <a href="/" style="color:var(--orange)">메인으로</a></p>';
}else{
  document.title='기찬푸드 — '+p.name;
  document.getElementById('productTitle').textContent=p.name;
  document.getElementById('productDesc').textContent=p.desc;

  // 메인 이미지
  document.getElementById('mainImg').src=BASE+p.imgs[0];
  document.getElementById('mainImg').onerror=function(){this.style.background='#f1f5f9'};

  // 썸네일
  const thumbsEl=document.getElementById('thumbs');
  p.imgs.forEach((f,i)=>{
    const img=document.createElement('img');
    img.src=BASE+f;
    img.className='thumb'+(i===0?' active':'');
    img.loading='lazy';
    img.onerror=function(){this.style.display='none'};
    img.addEventListener('click',function(){
      document.getElementById('mainImg').src=BASE+f;
      document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));
      this.classList.add('active');
    });
    thumbsEl.appendChild(img);
  });

  // 옵션
  const optsEl=document.getElementById('options');
  p.opts.forEach((o,i)=>{
    const label=document.createElement('label');
    label.className='opt-row'+(i===0?' sel':'');
    label.innerHTML=`<input type="radio" name="opt" ${i===0?'checked':''}><span class="opt-name">${o.n}</span><span class="opt-price">${o.p}</span>`;
    label.addEventListener('click',function(){
      document.querySelectorAll('.opt-row').forEach(r=>r.classList.remove('sel'));
      this.classList.add('sel');
      this.querySelector('input').checked=true;
      document.getElementById('oOption').value=o.n+' — '+o.p;
    });
    optsEl.appendChild(label);
  });
  // 첫 옵션 기본 세팅
  if(p.opts.length>0) document.getElementById('oOption').value=p.opts[0].n+' — '+p.opts[0].p;
}

function scrollToForm(){
  document.getElementById('orderSection').scrollIntoView({behavior:'smooth',block:'start'});
}

async function sendSMS(text){
  const res=await fetch('/api/send-sms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||'SMS 전송 실패');}
  return res.json();
}

async function submitOrder(){
  const name=document.getElementById('oName').value.trim();
  const phone=document.getElementById('oPhone').value.trim();
  const rest=document.getElementById('oRest').value.trim();
  const option=document.getElementById('oOption').value.trim();
  const msg=document.getElementById('oMsg').value.trim();
  if(!name||!phone){alert('성함과 연락처는 필수입니다.');return;}

  document.getElementById('oSubmit').disabled=true;
  document.getElementById('orderForm').style.display='none';
  document.getElementById('oSending').style.display='block';

  const now=new Date();
  const time=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const text=[
    '📦 기찬푸드 주문/샘플 신청',
    '─────────────────',
    `🛒 제품: ${p?p.name:'알 수 없음'}`,
    `📋 옵션: ${option||'(미선택)'}`,
    `👤 성함: ${name}`,
    `📞 연락처: ${phone}`,
    `🏪 식당명: ${rest||'(미입력)'}`,
    `💬 문의: ${msg||'샘플 신청 원합니다.'}`,
    '─────────────────',
    `🕐 ${time} 접수`
  ].join('\n');

  try{
    await sendSMS(text);
    document.getElementById('oSending').style.display='none';
    document.getElementById('oSuccess').style.display='block';
  }catch(e){
    document.getElementById('oSending').style.display='none';
    document.getElementById('orderForm').style.display='block';
    document.getElementById('oSubmit').disabled=false;
    alert('전송 실패. 잠시 후 다시 시도해주세요.\n('+e.message+')');
  }
}
